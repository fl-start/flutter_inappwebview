name: Linux WebKitGTK CI

on:
  push:
    branches: [master, main]
    paths:
      - ".github/workflows/linux_webkitgtk_ci.yml"
      - "flutter_inappwebview/**"
      - "flutter_inappwebview_linux_webkitgtk/**"
      - "flutter_inappwebview_platform_interface/**"
  pull_request:
    branches: [master, main]
    paths:
      - ".github/workflows/linux_webkitgtk_ci.yml"
      - "flutter_inappwebview/**"
      - "flutter_inappwebview_linux_webkitgtk/**"
      - "flutter_inappwebview_platform_interface/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: linux-webkitgtk-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter_inappwebview_linux_webkitgtk
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: dart analyze --fatal-infos
      - run: flutter test

  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter_inappwebview/example
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install WebKitGTK build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev clang cmake ninja-build pkg-config
      - run: flutter pub get
      - run: flutter build linux --debug --verbose
