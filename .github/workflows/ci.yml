name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  analyze:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter_inappwebview
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      # Generated/gitignored; required by integration tests that import environment.
      - name: Generate integration test env.dart
        working-directory: ${{ github.workspace }}
        run: dart run tool/env.dart
        env:
          NODE_SERVER_IP: 127.0.0.1
      - run: dart analyze --fatal-infos

  windows-build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: flutter_inappwebview/example
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build windows --debug

  android-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter_inappwebview/example
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - run: flutter pub get
      - run: flutter build apk --debug
        env:
          GRADLE_OPTS: -Xmx4g -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g
